<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Hostel Leave System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #eef5ff;"></body>

    <div class="container text-center mt-5">
        <h2 class="text-center mt-4 fw-bold text-primary" style="font-family: 'Poppins', sans-serif;">
            Govt. Mahila Engineering College Ajmer
</h2>
    <h4 class="text-secondary">Hostel Leave Management System</h4>
</div>

<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center mb-4">Hostel Leave Login</h3>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <!-- Password field with eye icon -->
            <div class="mb-3">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" required>
                    <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">👁️</span>
                </div>
            </div>

            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-select" required>
                    <option value="">Select Role</option>
                    <option>Student</option>
                    <option>Caretaker</option>
                    <option>Warden</option>
                    <option>Admin</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <!-- ✅ Forgot Password Link -->
        <p class="text-center mt-2">
            <a href="/forgot-password">Forgot Password?</a>
        </p>

        <p class="text-center mt-3">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Toggle password visibility
    function togglePassword() {
        var pwd = document.getElementById("password");
        if (pwd.type === "password") {
            pwd.type = "text";
        } else {
            pwd.type = "password";
        }
    }
</script>
</body>
</html>
